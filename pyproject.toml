[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "wealthbox-tools"
version = "0.8.0"
description = "CLI and client library for the Wealthbox CRM API"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.0,<3.0",
    "httpx>=0.27,<1.0",
    "typer>=0.12,<1.0",
    "python-dotenv>=1.0,<2.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "respx>=0.21",
]

[project.scripts]
wbox = "wealthbox_tools.cli.main:app"
wb = "wealthbox_tools.cli.main:app"

[tool.hatch.build.targets.wheel]
packages = ["src/wealthbox_tools"]
